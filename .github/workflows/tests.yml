name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  UV_SYSTEM_PYTHON: 1

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true
          cache-dependency-glob: "pyproject.toml"

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install the project with dev dependencies
        run: uv sync --extra dev

      - name: Run math utils tests
        run: uv run pytest tests/test_math_utils.py -v

      - name: Run paper trade tests
        run: uv run pytest tests/test_paper_trade.py -v

      - name: Run workflow function tests
        run: uv run pytest tests/test_workflow_functions.py -v

      - name: Run tool unit tests (mocked, no network)
        run: uv run pytest tests/test_tools_unit.py -v

      - name: Run route tests
        run: uv run pytest tests/test_routes.py -v
