services:
  polymarket-predictor-db:
    image: agnohq/pgvector:18
    container_name: polymarket-predictor-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-ai}
      POSTGRES_PASSWORD: ${DB_PASS:-ai}
      POSTGRES_DB: ${DB_DATABASE:-ai}
    volumes:
      - pgdata:/var/lib/postgresql
    networks:
      - polymarket-predictor

  polymarket-predictor-api:
    build:
      context: .
      dockerfile: Dockerfile
    image: ${IMAGE_NAME:-polymarket-predictor}:${IMAGE_TAG:-latest}
    container_name: polymarket-predictor-api
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000
    restart: unless-stopped
    ports:
      - "${API_PORT:-8000}:8000"
    environment:
      RUNTIME_ENV: prd
      AGNO_DEBUG: "false"
      PYTHONPATH: /app
      DB_HOST: polymarket-predictor-db
      DB_PORT: "5432"
      DB_USER: ${DB_USER:-ai}
      DB_PASS: ${DB_PASS:-ai}
      DB_DATABASE: ${DB_DATABASE:-ai}
      WAIT_FOR_DB: "true"
      PRINT_ENV_ON_LOAD: "false"
      TRACING_ENABLED: "false"
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      XAI_API_KEY: ${XAI_API_KEY}
      XAI_MODEL_ID: ${XAI_MODEL_ID:-grok-4-1-fast-non-reasoning}
      EXA_API_KEY: ${EXA_API_KEY}
      COINGLASS_API_KEY: ${COINGLASS_API_KEY:-}
    depends_on:
      - polymarket-predictor-db
    networks:
      - polymarket-predictor
    extra_hosts:
      - "host.docker.internal:host-gateway"

networks:
  polymarket-predictor:

volumes:
  pgdata:
