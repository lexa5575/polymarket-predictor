chat:
  quick_prompts:
    # Individual Agents
    polymarket-scanner:
      - "Scan active crypto prediction markets"
      - "Find top 5 crypto events by liquidity"
      - "What BTC markets are active on Polymarket?"

    polymarket-agent:
      - "Get details for the BTC $100K prediction market"
      - "Show orderbook depth for the ETH price market"
      - "What's the implied probability for BTC hitting $150K?"

    market-data-agent:
      - "What's the current Bitcoin price and market data?"
      - "Show me ETH funding rate and open interest"
      - "What's the Crypto Fear & Greed Index right now?"

    news-agent:
      - "What's the sentiment around BTC reaching $100K?"
      - "Latest crypto regulatory news and impact"
      - "What's X/Twitter saying about the Bitcoin ETF?"

    risk-agent:
      - "Evaluate risk for betting YES on BTC $100K by June"
      - "How many correlated BTC positions do we have?"
      - "Is this market liquid enough for a $500 bet?"

    knowledge-agent:
      - "What past memos do we have on file?"
      - "How does Kelly Criterion work for prediction markets?"
      - "Show me our track record on BTC price predictions"

    logger-agent:
      - "Write a memo for a BET YES on BTC $100K"
      - "List all existing prediction memos"

    # decision-agent: Internal only — all BET/SKIP decisions go through the prediction workflow.
    # Direct access retained in AgentOS UI for debugging, but no user-facing quick prompts.

    # Teams (analytical only — use workflow for actual BET/SKIP decisions)
    coordinate-team:
      - "Analyze the BTC $100K prediction market — what's the edge?"
      - "What's the probability of ETH reaching $5K?"
      - "Assess crypto ETF approval markets for potential opportunities"

    route-team:
      - "What's the Fear & Greed Index?"
      - "Check our past BTC prediction memos"
      - "What's the BTC funding rate?"

    broadcast-team:
      - "Full team analysis: BTC $100K by June 2026 — probability and risk?"
      - "All agents: what's our edge on the ETH ETF approval market?"
      - "Independent assessment: is there mispricing on BTC $150K?"

    task-team:
      - "Analyze top 5 crypto prediction markets — estimate edge for each"
      - "Research BTC and ETH events and rank by opportunity"
      - "Review all open positions and flag any for re-evaluation"

    # Workflows
    prediction-workflow:
      - "Run full prediction analysis on BTC $100K market"
      - "Process ETH $5K prediction through the pipeline"
      - "Evaluate the BTC halving impact prediction market"
